<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones - Timelapse 3D</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #c9a961;
            background: transparent;
            padding: 15px;
            border: none;
            z-index: 100;
        }
        #legend {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 250px;
            color: #e8dcc4;
            background: rgba(20,15,10,0.9);
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #c9a961;
            z-index: 100;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        #info button {
            margin-top: 5px;
            margin-right: 5px;
            padding: 8px 16px;
            background: #c9a961;
            color: #1a1410;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }
        #info button:hover { background: #d4b76a; }
        #legendContent {
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
        }
        #legendContent::-webkit-scrollbar {
            width: 8px;
        }
        #legendContent::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        #legendContent::-webkit-scrollbar-thumb {
            background: #c9a961;
            border-radius: 4px;
        }
        #legendContent::-webkit-scrollbar-thumb:hover {
            background: #d4b76a;
        }
        .filter-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .filter-btn {
            padding: 5px 10px;
            background: rgba(20,15,10,0.8);
            border: 1px solid #c9a961;
            color: #e8dcc4;
            cursor: pointer;
            border-radius: 3px;
            font-size: 11px;
        }
        .filter-btn.active {
            background: #c9a961;
            color: #1a1410;
            font-weight: bold;
        }
        .char-item {
            margin: 5px 0;
            font-size: 12px;
            padding: 3px;
            border-radius: 3px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .char-active {
            background: rgba(76, 175, 80, 0.5);
            color: #4CAF50;
        }
        .char-left {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        .char-notyet {
            color: #666;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20,15,10,0.9);
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #c9a961;
            width: 450px;
            color: #e8dcc4;
            z-index: 100;
        }
        #episodeLabel {
            text-align: center;
            font-size: 18px;
            color: #c9a961;
            margin-bottom: 10px;
        }
        #slider {
            width: 100%;
            margin-bottom: 15px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            background: #c9a961;
            color: #1a1410;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #d4b76a; }
        .back-btn {
            display: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <button onclick="window.location.href='index.html'">🏠 Início</button>
        <button onclick="window.location.href='rankings.html'">📊 Rankings</button>
        <button onclick="window.location.href='eventos.html'">🎬 Eventos</button>
        <button onclick="window.location.href='visualizador.html'">🌐 Visualizador</button>
        <h3 style="margin-top: 15px;">⏱️ Timelapse</h3>
        <p>Visíveis: <span id="visibleCount">0</span></p>
        <p>Total: <span id="totalCount">0</span></p>
        <p>Comunidade: <span id="topCommunity">-</span></p>
    </div>
    
    <div id="legend">
        <h3>Personagens</h3>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="toggleFilter('all')">Todos</button>
            <button class="filter-btn" onclick="toggleFilter('active')">Ativos</button>
            <button class="filter-btn" onclick="toggleFilter('left')">Saíram</button>
            <button class="filter-btn" onclick="toggleFilter('notyet')">Não apareceram</button>
        </div>
        <div id="legendContent"></div>
    </div>
    
    <div id="controls">
        <div id="episodeLabel">S1E1</div>
        <input type="range" id="slider" min="0" max="72" value="0" step="1">
        <div class="buttons">
            <button onclick="prevEpisode()">◀ Anterior</button>
            <button onclick="togglePlay()" id="playBtn">▶ Play</button>
            <button onclick="nextEpisode()">Próximo ▶</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let allNodes = [];
        let allEdges = [];
        let graphData = null;
        let timelapseData = null;
        let currentEpisodeIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let imageCache = {};
        let rotationEnabled = false;
        let legendFilter = 'all';
        
        const communityNames = ['Stark/Norte', 'Lannister', 'Targaryen', 'Nights Watch', 'Baratheon', 'Outros', 'Secundarios', 'Terciarios'];

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(0, 0, 15000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            createStars();
            
            await loadData();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1, opacity: 0.3, transparent: true });
            const starsVertices = [];
            for (let i = 0; i < 5000; i++) {
                starsVertices.push((Math.random() - 0.5) * 50000, (Math.random() - 0.5) * 50000, (Math.random() - 0.5) * 50000);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            scene.add(new THREE.Points(starsGeometry, starsMaterial));
        }

        async function loadData() {
            const [graphResp, timelapseResp] = await Promise.all([
                fetch('graph_data.json'),
                fetch('timelapse_data.json')
            ]);
            
            graphData = await graphResp.json();
            timelapseData = await timelapseResp.json();
            
            document.getElementById('slider').max = timelapseData.episodios.length - 1;
            document.getElementById('totalCount').textContent = graphData.nodes.length;
            
            createGraph(graphData);
            updateVisibility();
        }

        function createGraph(data) {
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffa500, 0x800080];
            
            data.nodes.forEach((node) => {
                const imgPath = `personagens_fotos/${node.id.replace(/ /g, '_').replace(/\//g, '_')}.jpg`;
                
                const photoCanvas = document.createElement('canvas');
                photoCanvas.width = 512;
                photoCanvas.height = 512;
                const photoCtx = photoCanvas.getContext('2d');
                
                const spriteMaterial = new THREE.SpriteMaterial({ transparent: true });
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.scale.set(node.size * 2, node.size * 2, 1);
                sprite.position.set(node.x, node.y, node.z);
                sprite.userData = { name: node.id };
                scene.add(sprite);
                
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    photoCtx.clearRect(0, 0, 512, 512);
                    photoCtx.beginPath();
                    photoCtx.arc(256, 256, 256, 0, Math.PI * 2);
                    photoCtx.clip();
                    photoCtx.drawImage(img, 0, 0, 512, 512);
                    sprite.material.map = new THREE.CanvasTexture(photoCanvas);
                    sprite.material.needsUpdate = true;
                };
                img.onerror = () => {
                    photoCtx.fillStyle = `#${colors[node.community % colors.length].toString(16).padStart(6, '0')}`;
                    photoCtx.beginPath();
                    photoCtx.arc(256, 256, 256, 0, Math.PI * 2);
                    photoCtx.fill();
                    photoCtx.fillStyle = 'white';
                    photoCtx.font = 'bold 80px Arial';
                    photoCtx.textAlign = 'center';
                    photoCtx.fillText(node.id.substring(0, 2), 256, 280);
                    sprite.material.map = new THREE.CanvasTexture(photoCanvas);
                    sprite.material.needsUpdate = true;
                };
                img.src = imgPath;
                
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = `#${colors[node.community % colors.length].toString(16).padStart(6, '0')}`;
                ctx.lineWidth = 20;
                ctx.beginPath();
                ctx.arc(256, 256, 236, 0, Math.PI * 2);
                ctx.stroke();
                
                const ringTexture = new THREE.CanvasTexture(canvas);
                const ring = new THREE.Sprite(new THREE.SpriteMaterial({ map: ringTexture, transparent: true }));
                ring.scale.set(node.size * 2.2, node.size * 2.2, 1);
                ring.position.set(node.x, node.y, node.z);
                scene.add(ring);
                
                const labelCanvas = document.createElement('canvas');
                labelCanvas.width = 256;
                labelCanvas.height = 64;
                const labelCtx = labelCanvas.getContext('2d');
                labelCtx.fillStyle = 'white';
                labelCtx.font = '20px Arial';
                labelCtx.fillText(node.id, 10, 30);
                
                const labelTexture = new THREE.CanvasTexture(labelCanvas);
                const labelSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: labelTexture }));
                labelSprite.position.set(node.x, node.y + node.size + 50, node.z);
                labelSprite.scale.set(300, 75, 1);
                scene.add(labelSprite);
                
                allNodes.push({ sphere: sprite, label: labelSprite, ring, name: node.id });
            });

            data.edges.forEach(edge => {
                const fromNode = data.nodes.find(n => n.id === edge.source);
                const toNode = data.nodes.find(n => n.id === edge.target);
                
                if (fromNode && toNode) {
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(fromNode.x, fromNode.y, fromNode.z),
                        new THREE.Vector3(toNode.x, toNode.y, toNode.z)
                    ]);
                    const material = new THREE.LineBasicMaterial({ 
                        color: 0xcccccc, 
                        transparent: true, 
                        opacity: Math.min(edge.weight / 100, 0.4)
                    });
                    const line = new THREE.Line(geometry, material);
                    line.userData = { weight: edge.weight };
                    scene.add(line);
                    allEdges.push({ line, source: edge.source, target: edge.target });
                }
            });
        }

        function updateVisibility() {
            const episodio = timelapseData.episodios[currentEpisodeIndex];
            const personagensAtivos = new Set(episodio.personagens_ativos);
            const personagensVisiveis = new Set(episodio.personagens_visiveis);
            const todosPersonagens = new Set(episodio.todos_personagens);
            
            let visibleCount = 0;
            allNodes.forEach(node => {
                const visible = personagensVisiveis.has(node.name);
                node.sphere.visible = visible;
                node.label.visible = visible;
                node.ring.visible = visible;
                if (visible) visibleCount++;
            });
            
            allEdges.forEach(edge => {
                edge.line.visible = personagensVisiveis.has(edge.source) && personagensVisiveis.has(edge.target);
            });
            
            document.getElementById('episodeLabel').textContent = `S${episodio.temporada}E${episodio.episodio}`;
            document.getElementById('slider').value = currentEpisodeIndex;
            document.getElementById('visibleCount').textContent = visibleCount;
            
            // Calcular comunidade mais relevante
            const communityCount = {};
            graphData.nodes.forEach(node => {
                if (personagensVisiveis.has(node.id)) {
                    communityCount[node.community] = (communityCount[node.community] || 0) + node.influence_score;
                }
            });
            const topComm = Object.entries(communityCount).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('topCommunity').textContent = topComm ? communityNames[topComm[0]] : '-';
            
            // Atualizar legenda com cores
            const sortedNodes = graphData.nodes.sort((a, b) => b.influence_score - a.influence_score);
            const legendHtml = sortedNodes.map(node => {
                let className = 'char-item';
                let type = '';
                if (personagensAtivos.has(node.id)) {
                    className += ' char-active';
                    type = 'active';
                } else if (personagensVisiveis.has(node.id)) {
                    className += ' char-left';
                    type = 'left';
                } else if (todosPersonagens.has(node.id)) {
                    className += ' char-left';
                    type = 'left';
                } else {
                    className += ' char-notyet';
                    type = 'notyet';
                }
                
                // Aplicar filtro
                if (legendFilter !== 'all' && legendFilter !== type) {
                    return '';
                }
                
                return `<div class="${className}">${node.id}</div>`;
            }).join('');
            document.getElementById('legendContent').innerHTML = legendHtml;
        }
        
        function toggleFilter(filter) {
            legendFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateVisibility();
        }

        function nextEpisode() {
            if (currentEpisodeIndex < timelapseData.episodios.length - 1) {
                currentEpisodeIndex++;
                updateVisibility();
            }
        }

        function prevEpisode() {
            if (currentEpisodeIndex > 0) {
                currentEpisodeIndex--;
                updateVisibility();
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            rotationEnabled = !rotationEnabled;
            const btn = document.getElementById('playBtn');
            
            if (isPlaying) {
                btn.textContent = '⏸ Pause';
                playInterval = setInterval(() => {
                    if (currentEpisodeIndex < timelapseData.episodios.length - 1) {
                        nextEpisode();
                    } else {
                        togglePlay();
                    }
                }, 3000);
            } else {
                btn.textContent = '▶ Play';
                clearInterval(playInterval);
            }
        }

        document.getElementById('slider').addEventListener('input', (e) => {
            currentEpisodeIndex = parseInt(e.target.value);
            updateVisibility();
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotacionar câmera ao redor do centro apenas se estiver em play
            if (rotationEnabled) {
                const radius = 15000;
                const speed = 0.00005;
                camera.position.x = Math.sin(Date.now() * speed) * radius;
                camera.position.z = Math.cos(Date.now() * speed) * radius;
                camera.lookAt(0, 0, 0);
            }
            
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
