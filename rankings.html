<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones - Rankings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #000000;
            color: white;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
        }
        h1 { 
            text-align: center;
            margin-bottom: 20px;
            color: #c9a961;
            font-size: 32px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            background: rgba(20,15,10,0.8);
            color: #e8dcc4;
            border: 2px solid #c9a961;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { 
            background: rgba(30,25,20,0.9);
            border-color: #d4b76a;
        }
        button.active { 
            background: #c9a961;
            border-color: #c9a961;
            color: #1a1410;
            font-weight: bold;
        }
        table {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-collapse: collapse;
            background: rgba(20,15,10,0.9);
            border: 2px solid #c9a961;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #c9a961;
            color: #e8dcc4;
        }
        th {
            background: rgba(30,25,20,0.95);
            position: sticky;
            top: 0;
            color: #c9a961;
            font-weight: bold;
        }
        tr:hover { background: rgba(30,25,20,0.8); }
        .rank { 
            font-weight: bold; 
            color: #c9a961;
            width: 60px;
        }
        .name { 
            font-weight: bold;
            color: #e8dcc4;
        }
        .value { color: #d4b76a; }
        .top3 { background: rgba(201,169,97,0.2); }
        img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="container">
    <h1>Game of Thrones - Rankings de Personagens</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="index.html" style="display: inline-block; padding: 10px 20px; background: #c9a961; color: #1a1410; text-decoration: none; border-radius: 5px; margin-right: 10px; font-weight: bold; border: 2px solid #c9a961;">🏠 Início</a>
        <a href="visualizador.html" style="display: inline-block; padding: 10px 20px; background: rgba(20,15,10,0.8); color: #c9a961; text-decoration: none; border-radius: 5px; margin-right: 10px; border: 2px solid #c9a961; font-weight: bold;">🌐 Visualizador</a>
        <a href="eventos.html" style="display: inline-block; padding: 10px 20px; background: rgba(20,15,10,0.8); color: #c9a961; text-decoration: none; border-radius: 5px; margin-right: 10px; border: 2px solid #c9a961; font-weight: bold;">🎬 Eventos</a>
        <a href="timelapse.html" style="display: inline-block; padding: 10px 20px; background: rgba(20,15,10,0.8); color: #c9a961; text-decoration: none; border-radius: 5px; margin-right: 10px; border: 2px solid #c9a961; font-weight: bold;">⏱️ Timelapse</a>
        <a href="metricas.html" style="display: inline-block; padding: 10px 20px; background: rgba(20,15,10,0.8); color: #c9a961; text-decoration: none; border-radius: 5px; border: 2px solid #c9a961; font-weight: bold;">📚 Métricas</a>
    </div>
    
    <div class="buttons">
        <button onclick="sortBy('influence_score')" class="active" id="btn-influence">Influence Score</button>
        <button onclick="sortBy('pagerank')" id="btn-pagerank">PageRank</button>
        <button onclick="sortBy('betweenness')" id="btn-betweenness">Betweenness</button>
        <button onclick="sortBy('weighted_degree')" id="btn-weighted">Weighted Degree</button>
        <button onclick="sortBy('connections')" id="btn-connections">Conexões</button>
    </div>
    
    <table>
        <thead>
            <tr>
                <th class="rank">#</th>
                <th>Personagem</th>
                <th>Valor</th>
                <th>Comunidade</th>
            </tr>
        </thead>
        <tbody id="rankingTable">
            <tr><td colspan="4" style="text-align: center;">Carregando...</td></tr>
        </tbody>
    </table>
    </div>

    <script>
        let graphData = null;
        let currentMetric = 'influence_score';
        
        const communityNames = [
            'Stark/Norte',
            'Lannister',
            'Targaryen',
            'Night\'s Watch',
            'Baratheon',
            'Outros',
            'Secundários',
            'Terciários'
        ];
        
        const metricLabels = {
            'influence_score': 'Influence Score',
            'pagerank': 'PageRank',
            'betweenness': 'Betweenness',
            'weighted_degree': 'Weighted Degree',
            'connections': 'Conexões'
        };

        async function loadData() {
            try {
                const response = await fetch('graph_data.json');
                graphData = await response.json();
                sortBy('influence_score');
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('rankingTable').innerHTML = 
                    '<tr><td colspan="4" style="text-align: center;">Erro ao carregar dados</td></tr>';
            }
        }

        function sortBy(metric) {
            currentMetric = metric;
            
            // Atualizar botões
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            const btnMap = {
                'influence_score': 'btn-influence',
                'pagerank': 'btn-pagerank',
                'betweenness': 'btn-betweenness',
                'weighted_degree': 'btn-weighted',
                'connections': 'btn-connections'
            };
            const btn = document.getElementById(btnMap[metric]);
            if (btn) btn.classList.add('active');
            
            // Ordenar dados
            const sorted = [...graphData.nodes].sort((a, b) => b[metric] - a[metric]);
            
            // Renderizar tabela
            const tbody = document.getElementById('rankingTable');
            tbody.innerHTML = sorted.map((node, index) => {
                const imgPath = `personagens_fotos/${node.id.replace(/ /g, '_').replace(/\//g, '_')}.jpg`;
                const commName = communityNames[node.community] || `Comunidade ${node.community}`;
                const value = metric === 'connections' ? node[metric] : node[metric].toFixed(4);
                const rowClass = index < 3 ? 'top3' : '';
                
                return `
                    <tr class="${rowClass}">
                        <td class="rank">${index + 1}</td>
                        <td class="name">
                            <img src="${imgPath}" onerror="this.style.display='none'" />
                            ${node.id}
                        </td>
                        <td class="value">${value}</td>
                        <td>${commName}</td>
                    </tr>
                `;
            }).join('');
        }

        // Criar estrelas de fundo
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const radius = Math.random() * 1.5;
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        loadData();
    </script>
</body>
</html>
