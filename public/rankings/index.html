<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones - Rankings</title>
    <link rel="stylesheet" href="../assets/geral.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="container">
    <h1>Game of Thrones - Rankings de Personagens</h1>
    
    <div id="nav-menu"></div>
    
    <div class="buttons">
        <button onclick="sortBy('consolidated_score')" class="active" id="btn-consolidated">Score Consolidado</button>
        <button onclick="sortBy('pagerank')" id="btn-pagerank">PageRank</button>
        <button onclick="sortBy('betweenness')" id="btn-betweenness">Betweenness</button>
        <button onclick="sortBy('degree_centrality')" id="btn-degree">Degree</button>
        <button onclick="sortBy('closeness_centrality')" id="btn-closeness">Closeness</button>
        <button onclick="sortBy('weighted_degree')" id="btn-weighted">Weighted Degree</button>
    </div>
    
    <div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th class="rank">#</th>
                <th>Personagem</th>
                <th>Valor</th>
                <th>Comunidade</th>
            </tr>
        </thead>
        <tbody id="rankingTable">
            <tr><td colspan="4" style="text-align: center;">Carregando...</td></tr>
        </tbody>
    </table>
    </div>
    </div>

    <script src="../assets/geral.js"></script>
    <script src="app.js"></script>
</body>
</html>
