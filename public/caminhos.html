<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones - Caminhos entre Personagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Crimson Text', serif;
            background: #0a0a0a;
            color: #e8dcc4;
            min-height: 100vh;
        }
        header {
            background: rgba(10,10,10,0.95);
            border-bottom: 2px solid #c9a961;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header nav { display: flex; gap: 8px; flex-wrap: wrap; }
        header nav a {
            padding: 7px 14px;
            background: rgba(20,15,10,0.8);
            color: #c9a961;
            text-decoration: none;
            border: 1px solid #c9a961;
            font-family: 'Cinzel', serif;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        header nav a:hover { background: #c9a961; color: #1a1410; }
        h1 {
            font-family: 'Cinzel', serif;
            color: #c9a961;
            font-size: 1.4em;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .main { display: flex; height: calc(100vh - 60px); }

        /* Painel esquerdo */
        .sidebar {
            width: 300px;
            min-width: 260px;
            background: rgba(15,12,8,0.98);
            border-right: 2px solid #c9a961;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-inner { padding: 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow: hidden; }
        .sidebar label { font-family: 'Cinzel', serif; color: #c9a961; font-size: 0.85em; letter-spacing: 1px; }
        .sidebar input[type=text] {
            width: 100%;
            padding: 8px 10px;
            background: rgba(30,22,12,0.9);
            border: 1px solid #c9a961;
            color: #e8dcc4;
            font-family: 'Crimson Text', serif;
            font-size: 1em;
        }
        .sidebar input[type=text]:focus { outline: none; border-color: #d4b76a; }
        #charSelect {
            flex: 1;
            min-height: 0;
            background: rgba(20,15,10,0.9);
            border: 1px solid #c9a961;
            color: #e8dcc4;
            font-family: 'Crimson Text', serif;
            font-size: 0.95em;
            overflow-y: auto;
        }
        #charSelect option { padding: 6px 10px; cursor: pointer; }
        #charSelect option:hover, #charSelect option:checked { background: #c9a961; color: #1a1410; }
        .btn-primary {
            padding: 10px;
            background: linear-gradient(135deg, #c9a961, #a88a4d);
            color: #1a1410;
            border: none;
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #d4b76a, #b89a5d); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Painel direito */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(10,8,5,0.97);
        }
        .content::-webkit-scrollbar { width: 8px; }
        .content::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .content::-webkit-scrollbar-thumb { background: #c9a961; border-radius: 4px; }

        /* Personagem selecionado */
        .selected-char {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(201,169,97,0.1);
            border: 2px solid #c9a961;
            margin-bottom: 20px;
        }
        .selected-char img {
            width: 70px; height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c9a961;
        }
        .selected-char .char-initials {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: #c9a961;
            color: #1a1410;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            font-weight: 700;
            flex-shrink: 0;
        }
        .selected-char h2 { font-family: 'Cinzel', serif; color: #c9a961; font-size: 1.3em; }
        .selected-char p { color: #b8a88a; font-size: 0.95em; margin-top: 4px; }

        /* Filtros */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 6px 14px;
            background: rgba(20,15,10,0.8);
            color: #c9a961;
            border: 1px solid #c9a961;
            font-family: 'Cinzel', serif;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .filter-btn.active, .filter-btn:hover { background: #c9a961; color: #1a1410; }
        .filter-search {
            padding: 6px 10px;
            background: rgba(30,22,12,0.9);
            border: 1px solid #c9a961;
            color: #e8dcc4;
            font-family: 'Crimson Text', serif;
            font-size: 0.95em;
            flex: 1;
            min-width: 160px;
        }
        .filter-search:focus { outline: none; border-color: #d4b76a; }
        .results-count { color: #b8a88a; font-size: 0.9em; margin-left: auto; }

        /* Grid de caminhos */
        .paths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
        }

        /* Card de caminho */
        .path-card {
            background: rgba(20,15,10,0.85);
            border: 1px solid #3a3025;
            padding: 12px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .path-card:hover { border-color: #c9a961; }
        .path-card.direct { border-left: 3px solid #4CAF50; }
        .path-card.two-hops { border-left: 3px solid #c9a961; }
        .path-card.three-hops { border-left: 3px solid #ff9800; }
        .path-card.far { border-left: 3px solid #f44336; }
        .path-card.unreachable { border-left: 3px solid #555; opacity: 0.5; }

        .path-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .path-card-header img, .path-card-header .char-thumb {
            width: 40px; height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c9a961;
            flex-shrink: 0;
        }
        .path-card-header .char-thumb {
            background: #c9a961;
            color: #1a1410;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            font-weight: 700;
        }
        .path-card-header .target-name {
            font-family: 'Cinzel', serif;
            color: #e8dcc4;
            font-size: 0.9em;
            flex: 1;
        }
        .path-card-header .target-familia {
            color: #b8a88a;
            font-size: 0.8em;
        }
        .hop-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            flex-shrink: 0;
        }
        .hop-badge.d1 { background: #4CAF50; color: #fff; }
        .hop-badge.d2 { background: #c9a961; color: #1a1410; }
        .hop-badge.d3 { background: #ff9800; color: #fff; }
        .hop-badge.d4 { background: #f44336; color: #fff; }
        .hop-badge.dn { background: #555; color: #aaa; }

        /* Visualização do caminho */
        .path-visual {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .path-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .path-node img, .path-node .node-thumb {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c9a961;
        }
        .path-node .node-thumb {
            background: #c9a961;
            color: #1a1410;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65em;
            font-weight: 700;
        }
        .path-node .node-name {
            font-size: 0.65em;
            color: #b8a88a;
            text-align: center;
            max-width: 50px;
            word-break: break-word;
            line-height: 1.2;
        }
        .path-arrow { color: #c9a961; font-size: 1em; margin-bottom: 14px; }

        /* Estado vazio */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b8a88a;
        }
        .empty-state .icon { font-size: 4em; margin-bottom: 16px; }
        .empty-state h3 { font-family: 'Cinzel', serif; color: #c9a961; margin-bottom: 10px; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #c9a961;
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
        }

        /* Legenda */
        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: rgba(20,15,10,0.6);
            border: 1px solid #3a3025;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: #b8a88a; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #0f0c08;
            border: 2px solid #c9a961;
            width: 100%;
            max-width: 720px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 14px 18px;
            border-bottom: 1px solid #c9a961;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-header h3 { font-family: 'Cinzel', serif; color: #c9a961; font-size: 1em; flex: 1; }
        .modal-close {
            background: none;
            border: none;
            color: #c9a961;
            font-size: 1.4em;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body { overflow-y: auto; padding: 16px; flex: 1; }
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background: #c9a961; border-radius: 3px; }
        .modal-pair {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #2a2015;
            margin-bottom: 10px;
        }
        .modal-pair img, .modal-pair .pair-thumb {
            width: 44px; height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c9a961;
            flex-shrink: 0;
        }
        .modal-pair .pair-thumb {
            background: #c9a961; color: #1a1410;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8em;
        }
        .modal-pair-info { flex: 1; }
        .modal-pair-info strong { font-family: 'Cinzel', serif; color: #e8dcc4; font-size: 0.85em; }
        .modal-pair-info span { color: #b8a88a; font-size: 0.8em; }
        .interaction-count { font-family: 'Cinzel', serif; color: #c9a961; font-size: 0.85em; }
        .interactions-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
        .interactions-table th {
            font-family: 'Cinzel', serif;
            color: #c9a961;
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid #c9a961;
            font-size: 0.8em;
            letter-spacing: 1px;
        }
        .interactions-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1410;
            color: #e8dcc4;
            vertical-align: top;
        }
        .interactions-table tr:hover td { background: rgba(201,169,97,0.07); }
        .tipo-badge {
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 0.75em;
            white-space: nowrap;
        }
        .tipo-direct { background: #4CAF5033; color: #4CAF50; }
        .tipo-group { background: #c9a96133; color: #c9a961; }
        .tipo-scene { background: #55555533; color: #aaa; }
        .section-title {
            font-family: 'Cinzel', serif;
            color: #c9a961;
            font-size: 0.8em;
            letter-spacing: 1px;
            margin: 14px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #3a3025;
        }
        .no-interactions { color: #666; font-size: 0.9em; padding: 10px 0; }

        @media (max-width: 700px) {
            .main { flex-direction: column; height: auto; }
            .sidebar { width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 2px solid #c9a961; }
            #charSelect { height: 150px; }
            .paths-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<header>
    <h1>⚔️ CAMINHOS</h1>
    <nav>
        <a href="index.html">🏠 Início</a>
        <a href="visualizador.html">🌐 Rede 3D</a>
        <a href="rankings.html">📊 Rankings</a>
        <a href="eventos.html">🎬 Eventos</a>
        <a href="timelapse.html">⏱️ Timelapse</a>
        <a href="metricas.html">📚 Métricas</a>
    </nav>
</header>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-inner">
            <label>SELECIONAR PERSONAGEM</label>
            <input type="text" id="searchInput" placeholder="Buscar personagem..." />
            <select id="charSelect" size="10"></select>
            <button class="btn-primary" id="btnAnalyze" disabled>⚔️ ANALISAR CAMINHOS</button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="empty-state">
            <div class="icon">🗺️</div>
            <h3>Caminhos entre Personagens</h3>
            <p>Selecione um personagem à esquerda e clique em "Analisar Caminhos" para ver o caminho mais curto até todos os outros personagens da série.</p>
        </div>
    </div>
</div>

<script>
let graphData = null;
let adjacency = {};
let interactionsIndex = null;

async function loadInteractions() {
    try {
        const res = await fetch('interactions_index.json');
        interactionsIndex = await res.json();
    } catch(e) { interactionsIndex = {}; }
}

function getInteractions(a, b) {
    if (!interactionsIndex) return [];
    const key = [a, b].sort().join('|||');
    return interactionsIndex[key] || [];
}

function openModal(path) {
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');
    body.innerHTML = '';

    // Para cada par consecutivo no caminho
    const pairs = [];
    for (let i = 0; i < path.length - 1; i++) pairs.push([path[i], path[i+1]]);

    title.textContent = `Interações: ${path[0].split(' ')[0]} → ${path[path.length-1].split(' ')[0]}`;

    pairs.forEach(([a, b]) => {
        const items = getInteractions(a, b);

        // Cabeçalho do par
        const pairDiv = document.createElement('div');
        pairDiv.className = 'modal-pair';
        pairDiv.innerHTML = `
            ${pairThumbHTML(a)}
            <div class="modal-pair-info"><strong>${a}</strong><br><span>↔</span></div>
            ${pairThumbHTML(b)}
            <div class="modal-pair-info"><strong>${b}</strong></div>
            <div class="interaction-count">${items.length} interações</div>
        `;
        body.appendChild(pairDiv);

        if (items.length === 0) {
            const p = document.createElement('p');
            p.className = 'no-interactions';
            p.textContent = 'Nenhuma interação direta encontrada no dataset.';
            body.appendChild(p);
            return;
        }

        // Agrupar por temporada
        const bySeason = {};
        items.forEach(it => {
            if (!bySeason[it.s]) bySeason[it.s] = [];
            bySeason[it.s].push(it);
        });

        Object.keys(bySeason).sort((a,b) => a-b).forEach(season => {
            const st = document.createElement('div');
            st.className = 'section-title';
            st.textContent = `Temporada ${season}`;
            body.appendChild(st);

            const table = document.createElement('table');
            table.className = 'interactions-table';
            table.innerHTML = `<thead><tr><th>Ep.</th><th>Cena</th><th>Tipo</th><th>Fala</th></tr></thead>`;
            const tbody = document.createElement('tbody');

            bySeason[season].forEach(it => {
                const tr = document.createElement('tr');
                const tipoClass = it.tipo === 'direct' ? 'tipo-direct' : it.tipo === 'group' ? 'tipo-group' : 'tipo-scene';
                tr.innerHTML = `
                    <td>${it.e}</td>
                    <td>${it.c}</td>
                    <td><span class="tipo-badge ${tipoClass}">${it.tipo}</span></td>
                    <td>${it.fala || '—'}</td>
                `;
                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            body.appendChild(table);
        });
    });

    document.getElementById('modalOverlay').classList.add('open');
}

function pairThumbHTML(name) {
    const src = `personagens_fotos/${name.replace(/ /g,'_').replace(/\//g,'_')}.jpg`;
    const ini = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<img src="${src}" alt="${name}" onerror="this.outerHTML='<div class=\'pair-thumb\'>${ini}</div>'" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #c9a961;flex-shrink:0">`;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('modalOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
});

async function loadData() {
    loadInteractions();
    const res = await fetch('graph_data.json?v=' + Date.now());
    graphData = await res.json();

    // Montar adjacência
    graphData.edges.forEach(e => {
        if (!adjacency[e.source]) adjacency[e.source] = [];
        if (!adjacency[e.target]) adjacency[e.target] = [];
        adjacency[e.source].push({ id: e.target, weight: e.weight });
        adjacency[e.target].push({ id: e.source, weight: e.weight });
    });

    // Popular select
    const select = document.getElementById('charSelect');
    const sorted = [...graphData.nodes].sort((a, b) => a.id.localeCompare(b.id));
    sorted.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.id;
        opt.textContent = n.id;
        select.appendChild(opt);
    });

    document.getElementById('btnAnalyze').disabled = false;
}

// Filtro de busca no select
document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    Array.from(document.getElementById('charSelect').options).forEach(opt => {
        opt.style.display = opt.value.toLowerCase().includes(q) ? '' : 'none';
    });
});

document.getElementById('btnAnalyze').addEventListener('click', () => {
    const sel = document.getElementById('charSelect').value;
    if (sel) analyze(sel);
});

document.getElementById('charSelect').addEventListener('dblclick', () => {
    const sel = document.getElementById('charSelect').value;
    if (sel) analyze(sel);
});

function bfsAll(start) {
    const dist = { [start]: 0 };
    const prev = { [start]: null };
    const queue = [start];
    while (queue.length) {
        const node = queue.shift();
        for (const nb of (adjacency[node] || [])) {
            if (!(nb.id in dist)) {
                dist[nb.id] = dist[node] + 1;
                prev[nb.id] = node;
                queue.push(nb.id);
            }
        }
    }
    return { dist, prev };
}

function reconstructPath(prev, target) {
    const path = [];
    let cur = target;
    while (cur !== null) {
        path.unshift(cur);
        cur = prev[cur];
    }
    return path;
}

function imgSrc(name) {
    return `personagens_fotos/${name.replace(/ /g, '_').replace(/\//g, '_')}.jpg`;
}

function initials(name) {
    return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function charThumb(name, size = 32) {
    const img = document.createElement('img');
    img.src = imgSrc(name);
    img.alt = name;
    img.title = name;
    img.style.width = size + 'px';
    img.style.height = size + 'px';
    img.style.borderRadius = '50%';
    img.style.objectFit = 'cover';
    img.style.border = '2px solid #c9a961';
    img.onerror = function() {
        const div = document.createElement('div');
        div.className = 'node-thumb';
        div.style.width = size + 'px';
        div.style.height = size + 'px';
        div.style.borderRadius = '50%';
        div.style.background = '#c9a961';
        div.style.color = '#1a1410';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'center';
        div.style.fontSize = (size * 0.28) + 'px';
        div.style.fontWeight = '700';
        div.style.border = '2px solid #c9a961';
        div.style.flexShrink = '0';
        div.textContent = initials(name);
        this.replaceWith(div);
    };
    return img;
}

let currentFilter = 'all';
let currentSearch = '';
let currentResults = [];
let currentChar = '';

function analyze(charName) {
    currentChar = charName;
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">⚔️ Calculando caminhos...</div>';

    setTimeout(() => {
        const { dist, prev } = bfsAll(charName);
        const nodeMap = {};
        graphData.nodes.forEach(n => nodeMap[n.id] = n);

        currentResults = graphData.nodes
            .filter(n => n.id !== charName)
            .map(n => {
                const d = dist[n.id];
                const path = d !== undefined ? reconstructPath(prev, n.id) : null;
                return { node: n, dist: d ?? Infinity, path };
            })
            .sort((a, b) => a.dist - b.dist || a.node.id.localeCompare(b.node.id));

        renderResults(charName, nodeMap);
    }, 10);
}

function renderResults(charName, nodeMap) {
    if (!nodeMap) {
        nodeMap = {};
        graphData.nodes.forEach(n => nodeMap[n.id] = n);
    }
    const charNode = nodeMap[charName];
    const content = document.getElementById('content');
    content.innerHTML = '';

    // Header do personagem selecionado
    const header = document.createElement('div');
    header.className = 'selected-char';
    const img = charThumb(charName, 70);
    img.style.width = '70px';
    img.style.height = '70px';
    img.style.border = '3px solid #c9a961';
    header.appendChild(img);
    const info = document.createElement('div');
    info.innerHTML = `<h2>${charName}</h2><p>${charNode?.familia || ''} &nbsp;|&nbsp; ${charNode?.connections || 0} conexões diretas</p>`;
    header.appendChild(info);
    content.appendChild(header);

    // Legenda
    const legend = document.createElement('div');
    legend.className = 'legend';
    legend.innerHTML = `
        <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div> Conexão direta (1 passo)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c9a961"></div> 2 passos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div> 3 passos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div> 4+ passos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Sem caminho</div>
    `;
    content.appendChild(legend);

    // Filtros
    const filters = document.createElement('div');
    filters.className = 'filters';
    const filterDefs = [
        { key: 'all', label: 'Todos' },
        { key: '1', label: '1 passo' },
        { key: '2', label: '2 passos' },
        { key: '3', label: '3 passos' },
        { key: '4+', label: '4+ passos' },
        { key: 'unreachable', label: 'Sem caminho' },
    ];
    filterDefs.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (currentFilter === f.key ? ' active' : '');
        btn.textContent = f.label;
        btn.dataset.filter = f.key;
        btn.addEventListener('click', () => {
            currentFilter = f.key;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        });
        filters.appendChild(btn);
    });

    const searchBox = document.createElement('input');
    searchBox.type = 'text';
    searchBox.className = 'filter-search';
    searchBox.placeholder = 'Filtrar por nome...';
    searchBox.value = currentSearch;
    searchBox.addEventListener('input', function() {
        currentSearch = this.value;
        renderGrid();
    });
    filters.appendChild(searchBox);

    const countEl = document.createElement('span');
    countEl.className = 'results-count';
    countEl.id = 'resultsCount';
    filters.appendChild(countEl);

    content.appendChild(filters);

    // Grid container
    const grid = document.createElement('div');
    grid.className = 'paths-grid';
    grid.id = 'pathsGrid';
    content.appendChild(grid);

    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('pathsGrid');
    const countEl = document.getElementById('resultsCount');
    if (!grid) return;
    grid.innerHTML = '';

    const filtered = currentResults.filter(r => {
        const nameMatch = !currentSearch || r.node.id.toLowerCase().includes(currentSearch.toLowerCase());
        let distMatch = true;
        if (currentFilter === '1') distMatch = r.dist === 1;
        else if (currentFilter === '2') distMatch = r.dist === 2;
        else if (currentFilter === '3') distMatch = r.dist === 3;
        else if (currentFilter === '4+') distMatch = r.dist >= 4 && r.dist !== Infinity;
        else if (currentFilter === 'unreachable') distMatch = r.dist === Infinity;
        return nameMatch && distMatch;
    });

    countEl.textContent = `${filtered.length} personagens`;

    filtered.forEach(({ node, dist, path }) => {
        const card = document.createElement('div');
        let cardClass = 'path-card';
        let badgeClass = 'dn';
        let badgeText = '∞';
        if (dist === 1) { cardClass += ' direct'; badgeClass = 'd1'; badgeText = '1 passo'; }
        else if (dist === 2) { cardClass += ' two-hops'; badgeClass = 'd2'; badgeText = '2 passos'; }
        else if (dist === 3) { cardClass += ' three-hops'; badgeClass = 'd3'; badgeText = '3 passos'; }
        else if (dist !== Infinity) { cardClass += ' far'; badgeClass = 'd4'; badgeText = dist + ' passos'; }
        else { cardClass += ' unreachable'; }
        card.className = cardClass;

        // Header do card
        const cardHeader = document.createElement('div');
        cardHeader.className = 'path-card-header';
        const thumb = charThumb(node.id, 40);
        cardHeader.appendChild(thumb);
        const nameDiv = document.createElement('div');
        nameDiv.style.flex = '1';
        nameDiv.innerHTML = `<div class="target-name">${node.id}</div><div class="target-familia">${node.familia || ''}</div>`;
        cardHeader.appendChild(nameDiv);
        const badge = document.createElement('span');
        badge.className = `hop-badge ${badgeClass}`;
        badge.textContent = badgeText;
        cardHeader.appendChild(badge);
        card.appendChild(cardHeader);

        // Visualização do caminho
        if (path && path.length > 1) {
            const pathVisual = document.createElement('div');
            pathVisual.className = 'path-visual';

            path.forEach((charId, idx) => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'path-node';
                const nodeImg = charThumb(charId, 32);
                nodeEl.appendChild(nodeImg);
                const nameEl = document.createElement('div');
                nameEl.className = 'node-name';
                nameEl.textContent = charId.split(' ')[0]; // só primeiro nome
                nodeEl.appendChild(nameEl);
                pathVisual.appendChild(nodeEl);

                if (idx < path.length - 1) {
                    const arrow = document.createElement('span');
                    arrow.className = 'path-arrow';
                    arrow.textContent = '→';
                    pathVisual.appendChild(arrow);
                }
            });

            card.appendChild(pathVisual);
        } else if (dist === Infinity) {
            const noPath = document.createElement('div');
            noPath.style.cssText = 'color:#666;font-size:0.85em;margin-top:6px;';
            noPath.textContent = 'Sem caminho encontrado na rede';
            card.appendChild(noPath);
        }

        if (path && path.length > 1) {
            card.addEventListener('click', () => openModal(path));
            card.title = 'Clique para ver as interações';
        }

        grid.appendChild(card);
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div style="color:#b8a88a;padding:20px;grid-column:1/-1;">Nenhum resultado encontrado.</div>';
    }
}

loadData();
</script>
<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Interações</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

</body>
