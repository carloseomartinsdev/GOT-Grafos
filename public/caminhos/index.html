<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones - Caminhos entre Personagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/geral.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
<header>
    <h1>⚔️ CAMINHOS</h1>
    <div id="nav-menu"></div>
</header>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-inner">
            <label>SELECIONAR PERSONAGEM</label>
            <input type="text" id="searchInput" placeholder="Buscar personagem..." />
            <select id="charSelect" size="10"></select>
            <button class="btn-primary" id="btnAnalyze" disabled>⚔️ ANALISAR CAMINHOS</button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="empty-state">
            <div class="icon">🗺️</div>
            <h3>Caminhos entre Personagens</h3>
            <p>Selecione um personagem à esquerda e clique em "Analisar Caminhos" para ver o caminho mais curto até todos os outros personagens da série.</p>
        </div>
    </div>
</div>

<script src="../assets/geral.js"></script>
<script src="app.js"></script>
<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Interações</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

</body>
</html>
